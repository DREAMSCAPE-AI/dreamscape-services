name: CI/CD Trigger for Services

on:
  push:
    branches: [main, dev, develop, feature/**, bugfix/**, hotfix/**]
  pull_request:
    branches: [main, dev, develop]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  statuses: write

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  INFRA_REPO: DREAMSCAPE-AI/dreamscape-infra

jobs:
  # ============================================================
  # Local CI: Fast validation before triggering central pipeline
  # ============================================================
  local-ci:
    name: Local CI & Validation
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    outputs:
      changed_services: ${{ steps.changes.outputs.changed_services }}
      should_trigger: ${{ steps.check.outputs.should_trigger }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Detect changed services
        id: changes
        run: |
          CHANGED_SERVICES=""

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }})
          else
            if [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
              CHANGED_FILES=$(git diff --name-only ${{ github.event.before }}..${{ github.event.after }})
            else
              CHANGED_FILES=$(git diff --name-only HEAD~1..HEAD 2>/dev/null || git ls-files)
            fi
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Detect which services were changed
          for service in auth user voyage payment ai panorama; do
            if echo "$CHANGED_FILES" | grep -qE "^(${service}/|${service}-service/)"; then
              if [[ -z "$CHANGED_SERVICES" ]]; then
                CHANGED_SERVICES="$service"
              else
                CHANGED_SERVICES="$CHANGED_SERVICES,$service"
              fi
            fi
          done

          # Check for shared/db changes affecting all services
          if echo "$CHANGED_FILES" | grep -qE "^(shared/|db/)"; then
            CHANGED_SERVICES="all"
          fi

          # If no specific service changed but files changed, mark as all
          if [[ -z "$CHANGED_SERVICES" ]] && [[ -n "$CHANGED_FILES" ]]; then
            CHANGED_SERVICES="all"
          fi

          echo "changed_services=${CHANGED_SERVICES}" >> $GITHUB_OUTPUT
          echo "✅ Detected changes: ${CHANGED_SERVICES}"

      - name: Check if central pipeline should be triggered
        id: check
        run: |
          if [[ -z "${{ steps.changes.outputs.changed_services }}" ]]; then
            echo "should_trigger=false" >> $GITHUB_OUTPUT
            echo "⏭️ No changes detected, skipping central pipeline"
          elif [[ "${{ github.event_name }}" == "pull_request" ]] && [[ -z "${{ secrets.DISPATCH_TOKEN }}" ]]; then
            echo "should_trigger=false" >> $GITHUB_OUTPUT
            echo "⚠️ PR from fork or missing token, skipping dispatch (normal behavior)"
          else
            echo "should_trigger=true" >> $GITHUB_OUTPUT
            echo "✅ Will trigger central pipeline"
          fi

      - name: Lint changed services
        if: steps.changes.outputs.changed_services != ''
        run: |
          SERVICES="${{ steps.changes.outputs.changed_services }}"

          if [[ "${SERVICES}" == "all" ]]; then
            SERVICES="auth,user,voyage,payment,ai,panorama"
          fi

          IFS=',' read -ra SERVICE_ARRAY <<< "$SERVICES"
          for service in "${SERVICE_ARRAY[@]}"; do
            SERVICE_DIR="${service}"
            [[ ! -d "${SERVICE_DIR}" ]] && SERVICE_DIR="${service}-service"

            if [[ -d "${SERVICE_DIR}" ]] && [[ -f "${SERVICE_DIR}/package.json" ]]; then
              echo "🔍 Linting ${service}..."
              (cd "${SERVICE_DIR}" && (npm ci 2>/dev/null || npm install) && npm run lint --if-present) || echo "⚠️ Lint issues in ${service}"
            fi
          done

  # ============================================================
  # Trigger Central Pipeline
  # ============================================================
  trigger-central-pipeline:
    name: Trigger Central CI/CD
    runs-on: ubuntu-latest
    needs: local-ci
    if: needs.local-ci.outputs.should_trigger == 'true'
    steps:
      - name: Trigger test suite in dreamscape-tests
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.DISPATCH_TOKEN }}
          script: |
            try {
              await github.rest.repos.createDispatchEvent({
                owner: 'DREAMSCAPE-AI',
                repo: 'dreamscape-tests',
                event_type: 'test-request',
                client_payload: {
                  repository: context.repo.repo,
                  branch: context.ref.replace('refs/heads/', ''),
                  sha: context.sha,
                  component: '${{ needs.local-ci.outputs.changed_services }}'
                }
              });

              console.log('✅ Test suite triggered in dreamscape-tests');

              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: 'pending',
                target_url: 'https://github.com/DREAMSCAPE-AI/dreamscape-tests/actions',
                description: 'Test suite triggered — CD will follow if tests pass on main',
                context: 'ci/unified-pipeline'
              });

            } catch (error) {
              console.error('❌ Failed to trigger test suite:', error);

              await github.rest.repos.createCommitStatus({
                owner: context.repo.owner,
                repo: context.repo.repo,
                sha: context.sha,
                state: 'error',
                description: 'Failed to trigger test suite',
                context: 'ci/unified-pipeline'
              });

              throw error;
            }

  # ============================================================
  # Summary
  # ============================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [local-ci, trigger-central-pipeline]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "# 📊 Services CI Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Event**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Ref**: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Changed Services**: ${{ needs.local-ci.outputs.changed_services }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.trigger-central-pipeline.result }}" == "success" ]]; then
            echo "✅ Central CI/CD pipeline triggered successfully" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [View Pipeline Progress](https://github.com/DREAMSCAPE-AI/dreamscape-infra/actions)" >> $GITHUB_STEP_SUMMARY
          elif [[ "${{ needs.trigger-central-pipeline.result }}" == "skipped" ]]; then
            echo "ℹ️ Central pipeline trigger skipped (no changes or PR from fork)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Failed to trigger central CI/CD pipeline" >> $GITHUB_STEP_SUMMARY
          fi
